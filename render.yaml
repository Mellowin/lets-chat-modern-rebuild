services:
  - type: web
    name: lets-chat-api-v2
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: .
    buildCommand: pnpm install --prod=false && pnpm run build:api:prod
    # Migrations are applied by the GitHub Actions 'migrate' job before this
    # service is deployed. Do NOT rely on render.yaml to update an existing
    # Render service; verify the actual dashboard Start Command matches this.
    startCommand: pnpm --filter api start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_URL
        value: https://lets-chat-api-v2.onrender.com/api/v1
      - key: APP_WEB_URL
        value: https://lets-chat-web.vercel.app
      - key: CORS_ORIGIN
        value: https://lets-chat-web.vercel.app
    healthCheckPath: /api/v1/health
    autoDeploy: false
