services:
  - type: web
    name: lets-chat-api-v2
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: .
    buildCommand: pnpm install --include=dev && pnpm run build:api:prod
    startCommand: pnpm --filter api start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_URL
        value: https://lets-chat-api-v2.onrender.com/api/v1
    healthCheckPath: /api/v1/health
    autoDeploy: true
