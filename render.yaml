services:
  - type: web
    name: lets-chat-api-v2
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: .
    # IMPORTANT: if you edit these commands, also update the Render dashboard
    # Settings for this service. render.yaml is not always auto-synced for
    # existing services.
    buildCommand: |
      pnpm install --prod=false
      pnpm run build:api:prod
      test -f apps/api/dist/main.js || (echo "❌ apps/api/dist/main.js not built" && exit 1)
    startCommand: |
      if [ -f apps/api/dist/main.js ]; then
        cd apps/api && node dist/main
      else
        node dist/main
      fi
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_URL
        value: https://lets-chat-api-v2.onrender.com/api/v1
      - key: APP_WEB_URL
        value: https://lets-chat-web.vercel.app
      - key: CORS_ORIGIN
        value: https://lets-chat-web.vercel.app
    healthCheckPath: /api/v1/health
    autoDeploy: false
