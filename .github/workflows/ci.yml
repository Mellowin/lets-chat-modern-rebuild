name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lets-chat/database generate

      - name: Build shared package
        run: pnpm --filter @lets-chat/shared build

      - name: Build database package
        run: pnpm --filter @lets-chat/database build

      - name: Build API
        run: pnpm --filter api build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Lint API
        run: pnpm --filter api lint

      - name: Typecheck API
        run: pnpm --filter api typecheck

      - name: Test API
        run: pnpm --filter api test

      - name: Typecheck Web
        run: pnpm --filter web typecheck

      - name: Test Web
        run: pnpm --filter web test

      - name: Test Web Pages
        run: pnpm --filter web test:pages

      - name: Lint Web
        run: pnpm --filter web lint

      - name: Build Web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: 'https://api.example.com/api/v1'
          NEXT_PUBLIC_WS_URL: 'https://api.example.com'

  deploy:
    name: Deploy API v2 to Render
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_V2_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_API_V2_DEPLOY_HOOK_URL is not configured."
            echo "    Render auto-deploy must be enabled in the dashboard, or the secret must be set."
            echo "    Skipping deploy hook trigger."
            exit 0
          fi

          echo "🚀 Triggering Render deploy hook for lets-chat-api-v2..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Render deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Render deploy hook accepted (HTTP $HTTP_CODE)"
