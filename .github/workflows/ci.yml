name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lets-chat/database generate

      - name: Build shared package
        run: pnpm --filter @lets-chat/shared build

      - name: Build database package
        run: pnpm --filter @lets-chat/database build

      - name: Build API
        run: pnpm --filter api build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Lint API
        run: pnpm --filter api lint

      - name: Typecheck API
        run: pnpm --filter api typecheck

      - name: Test API
        run: pnpm --filter api test

      - name: Typecheck Web
        run: pnpm --filter web typecheck

      - name: Test Web
        run: pnpm --filter web test

      - name: Test Web Pages
        run: pnpm --filter web test:pages

      - name: Lint Web
        run: pnpm --filter web lint

      - name: Build Web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: 'https://api.example.com/api/v1'
          NEXT_PUBLIC_WS_URL: 'https://api.example.com'

  api-e2e:
    name: API E2E security smoke tests
    needs: ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lets_chat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lets-chat/database generate

      - name: Build shared package
        run: pnpm --filter @lets-chat/shared build

      - name: Build database package
        run: pnpm --filter @lets-chat/database build

      - name: Apply migrations to test database
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/lets_chat_test?schema=public'
        run: pnpm --filter @lets-chat/database migrate:deploy

      - name: Run API E2E tests
        id: e2e
        env:
          NODE_ENV: test
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/lets_chat_test?schema=public'
          JWT_ACCESS_SECRET: 'ci-test-jwt-access-secret-min-32-characters-long'
          JWT_REFRESH_SECRET: 'ci-test-jwt-refresh-secret-min-32-characters-long'
          S3_ENDPOINT: 'http://localhost:9000'
          S3_ACCESS_KEY: 'minioadmin'
          S3_SECRET_KEY: 'minioadmin'
          S3_BUCKET: 'letschat-uploads'
          MAIL_PROVIDER: console
          APP_WEB_URL: 'http://localhost:3000'
        run: |
          set -o pipefail
          pnpm --filter api test:e2e 2>&1 | tee e2e-output.log

      - name: Upload E2E output artifact
        if: failure() && steps.e2e.outcome == 'failure'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: e2e-output
          path: e2e-output.log
          retention-days: 5

      - name: Print E2E failure details
        if: failure() && steps.e2e.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "::group::Filtered failure lines"
          grep -E 'FAIL|●|Expected|Received' e2e-output.log || true
          echo "::endgroup::"
          echo "::group::Last 200 lines"
          tail -n 200 e2e-output.log
          echo "::endgroup::"

      - name: Summarize E2E failure
        if: failure() && steps.e2e.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "## API E2E test failure output" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Filtered failure lines" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E 'FAIL|●|Expected|Received' e2e-output.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Last 200 lines" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 e2e-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate E2E failure lines
        if: failure() && steps.e2e.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "::error::API E2E tests failed. Filtered failure lines:"
          grep -E 'FAIL|●|Expected|Received' e2e-output.log | sed 's/%/%25/g; s/\r//g' | while IFS= read -r line; do
            printf "::error::%s\n" "$line"
          done

  migrate-production-render-manual:
    name: Migrate production database (Render, manual only)
    needs: [ci, api-e2e]
    runs-on: ubuntu-latest
    # Render production infrastructure is currently suspended/expired.
    # This job is kept for manual recovery only; it does not run on normal pushes.
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lets-chat/database generate

      # Migration must complete successfully before Render is allowed to deploy.
      # If PRODUCTION_DATABASE_URL is missing, both migration and deploy are skipped.
      - name: Check production database URL secret
        id: check
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PRODUCTION_DATABASE_URL is not configured. Skipping production migration and deploy."
            echo "         Add the secret in GitHub Settings → Secrets and variables → Actions."
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "✅ PRODUCTION_DATABASE_URL is configured."
          fi

      - name: Deploy production Prisma migrations
        if: steps.check.outputs.should_deploy == 'true'
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          echo "🚀 Running prisma migrate deploy against production database..."
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            if pnpm --filter @lets-chat/database migrate:deploy; then
              echo "✅ Production migrations applied successfully."
              exit 0
            fi
            echo "⚠️ Migration attempt $i failed. Retrying in 15s..."
            sleep 15
          done
          echo "❌ Production migrations failed after 3 attempts."
          exit 1

  deploy-production-render-manual:
    name: Deploy API v2 to Render (manual only)
    needs: [ci, migrate-production-render-manual, api-e2e]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      needs.migrate-production-render-manual.outputs.should_deploy == 'true'
    steps:
      - name: Trigger Render deploy hook
        id: trigger
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_V2_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_API_V2_DEPLOY_HOOK_URL is not configured."
            echo "    Render auto-deploy must be enabled in the dashboard, or the secret must be set."
            echo "    Skipping deploy hook trigger and verification."
            exit 0
          fi

          echo "🚀 Triggering Render deploy hook for lets-chat-api-v2..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Render deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Render deploy hook accepted (HTTP $HTTP_CODE)"
          echo "RENDER_DEPLOY_TRIGGERED=true" >> "$GITHUB_OUTPUT"

      - name: Verify live production revision
        if: steps.trigger.outputs.RENDER_DEPLOY_TRIGGERED == 'true'
        env:
          API_BASE: ${{ vars.VERIFICATION_API_URL || 'https://lets-chat-api-v2.onrender.com/api/v1' }}
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          echo "⏳ Waiting for production to serve commit $EXPECTED_COMMIT..."
          for i in $(seq 1 30); do
            sleep 20
            VERSION=$(curl -sf "$API_BASE/version" || echo '{}')
            COMMIT=$(echo "$VERSION" | jq -r '.commit // "unknown"')
            HEALTH=$(curl -sf "$API_BASE/health" | jq -r '.status // "unknown"' || echo 'unknown')
            echo "Attempt $i/30: commit=$COMMIT health=$HEALTH"

            if [ "$COMMIT" = "$EXPECTED_COMMIT" ] || [ "$COMMIT" = "${EXPECTED_COMMIT:0:7}" ]; then
              echo "✅ Production is serving the expected commit."
              exit 0
            fi

            if [ "$HEALTH" != "ok" ]; then
              echo "⚠️  Health check not ok yet."
            fi
          done

          echo "❌ Production did not report expected commit within 10 minutes."
          echo "   Last version response: $VERSION"
          exit 1

  local-smoke:
    name: Local infrastructure smoke test
    needs: [ci, api-e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    env:
      DATABASE_URL: postgresql://letschat:letschat@localhost:5432/letschat_local?schema=public
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: letschat-uploads
      S3_FORCE_PATH_STYLE: "true"
      JWT_ACCESS_SECRET: ci-test-jwt-access-secret-min-32-characters-long
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-min-32-characters-long
      MAIL_PROVIDER: smtp
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: mailpit
      SMTP_PASS: mailpit
      SMTP_FROM: noreply@example.com
      APP_WEB_URL: http://localhost:3000
      NODE_ENV: development
      PORT: 3001
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Postgres, Redis, MinIO and Mailpit
        run: docker compose up -d --wait

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations to local database
        run: pnpm db:migrate:local

      - name: Build API
        run: pnpm run build:api:prod

      - name: Start API in background
        run: |
          node apps/api/dist/src/main.js > api-smoke.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:3001/api/v1/health > /dev/null; then
              echo "✅ API is healthy (attempt $i)"
              exit 0
            fi
            echo "⏳ Waiting for API... attempt $i/30"
          done
          echo "❌ API did not become healthy"
          cat api-smoke.log || true
          exit 1

      - name: Check API version
        run: |
          echo "--- /version ---"
          curl -sf http://localhost:3001/api/v1/version || true

      - name: Run local register → verify → login smoke
        run: pnpm smoke:local

      - name: Stop API
        if: always()
        run: |
          if [ -n "$API_PID" ]; then
            kill "$API_PID" 2>/dev/null || true
            wait "$API_PID" 2>/dev/null || true
          fi
          echo "--- API log ---"
          cat api-smoke.log || true

      - name: Tear down local infrastructure
        if: always()
        run: docker compose down
