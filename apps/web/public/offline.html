<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lets Chat — Offline</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #dfe6f0;
      --fg: #0f172a;
      --primary: #4338ca;
      --primary-fg: #ffffff;
      --muted: #55627a;
      --card: #ffffff;
      --border: #b8c2d4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #070a14;
        --fg: #f8fafc;
        --primary: #6366f1;
        --primary-fg: #ffffff;
        --muted: #94a3b8;
        --card: #111827;
        --border: #2d3a52;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 22rem;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .icon {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
    }
    p {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--primary-fg);
      background: var(--primary);
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      min-height: 2.75rem;
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="card" role="alert" aria-live="polite">
    <svg class="icon" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="192" height="192" rx="32" fill="#4f46e5"/>
      <path d="M96 44c-28.7 0-52 21.5-52 48 0 14.4 6.8 27.3 17.5 35.7-1.1 6.5-4.1 14.4-8.4 20.3 9.2-1.3 18.3-5.6 24.3-10.4 5.9 1.7 12.2 2.6 18.6 2.6 28.7 0 52-21.5 52-48S124.7 44 96 44z" fill="#fff"/>
      <circle cx="70" cy="96" r="8" fill="#4f46e5"/>
      <circle cx="96" cy="96" r="8" fill="#4f46e5"/>
      <circle cx="122" cy="96" r="8" fill="#4f46e5"/>
    </svg>
    <h1>You are offline</h1>
    <p>Please check your internet connection and try again. New messages will load once you are back online.</p>
    <button type="button" onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>
